name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config \
            libpipewire-0.3-dev libwayland-dev libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked

      - name: Package
        run: |
          name="rayshot-${GITHUB_REF_NAME}-x86_64-linux"
          mkdir -p "dist/$name"
          cp target/release/rayshot "dist/$name/"
          cp README.md LICENSE "dist/$name/"
          tar -C dist -czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rayshot-*.tar.gz
            rayshot-*.tar.gz.sha256
